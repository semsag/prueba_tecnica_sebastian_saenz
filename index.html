<!DOCTYPE html>
<html lang="es">
<head>

<body>
    <div class="dashboard">
        <header>
            <h1>Infraestructura Kubernetes</h1>

            </div>

            <div class="card info-card">
                <h3>Detalles Técnicos</h3>
                <ul>
                    <li><strong>Orquestador:</strong> Kubernetes (Minikube)</li>
                    <li><strong>Arquitectura:</strong> Deployment </li>
                    <li><strong>Red:</strong> Ingress </li>
                    <
                </ul>
            </div>
        </main>

        <footer>
            <div id="clock">--:--:--</div>
            <p>Entorno: <span id="env-tag">Linux Mint / Windows 11</span></p>
        </footer>
    </div>
    <script src="script.js"></script>
