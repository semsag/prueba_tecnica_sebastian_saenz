apiVersion: apps/v1
kind: Deployment
metadata:
  name: stratio-web-deploy
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: mi-web
  template:
    metadata:
      labels:
        app: mi-web
    spec:
      containers:
      - name: contenedor-nginx
        image: mi-web-stratio:v1
        imagePullPolicy: Never 
        ports:
        - containerPort: 80

apiVersion: v1
kind: Service
metadata:
  name: stratio-service
spec:
  type: NodePort 
  selector:
    app: mi-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080 